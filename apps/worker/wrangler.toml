name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "5268940786bb53993e40475db7718ad4"

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here

[vars]
WORKER_URL = "https://line-crm-worker.nsindex-line.workers.dev"

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "ad924193-f043-4f87-8feb-bfc47db55974"

# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]
